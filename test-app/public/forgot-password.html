<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Echelix Test App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 8px; font-size: 24px; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 14px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; color: #444; font-size: 14px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #4CAF50; }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #45a049; }
    button[type="submit"]:disabled { background: #ccc; cursor: not-allowed; }
    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: #4CAF50;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
    .spinner { display: none; margin: 10px auto; text-align: center; color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your username and we'll send a reset link to your email</p>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage">
      ✅ Password reset email sent! Check your inbox for the reset link.
    </div>

    <form id="forgotForm">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Enter your username"
        required
      />

      <button type="submit" id="submitButton">Send Reset Link</button>
    </form>

    <div class="spinner" id="spinner">Sending reset email...</div>

    <a href="/login" class="back-link">Back to Login</a>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const errorEl = document.getElementById('errorMessage');
      const successEl = document.getElementById('successMessage');
      const spinnerEl = document.getElementById('spinner');
      const submitBtn = document.getElementById('submitButton');

      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      spinnerEl.style.display = 'block';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username }),
        });

        const data = await response.json();
        spinnerEl.style.display = 'none';

        if (response.ok && data.success) {
          successEl.style.display = 'block';
          document.getElementById('forgotForm').style.display = 'none';
        } else {
          errorEl.textContent = data.message || 'Failed to send reset email. Please try again.';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
        }
      } catch (err) {
        spinnerEl.style.display = 'none';
        errorEl.textContent = 'An error occurred. Please try again.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
